name: Ruby
extensions: [".rb"]
ts_grammar: tree_sitter_ruby

ts_class_query: |
  (class
    name: (constant) @name) @class
  (module
    name: (constant) @name) @class

ts_function_query: |
  (method
    name: (identifier) @name) @function

ts_import_query: |
  (call
    method: (identifier) @_method
    arguments: (argument_list (string (string_content) @module))
    (#match? @_method "^require"))

stdlib_prefixes:
  - json
  - yaml
  - csv
  - net
  - uri
  - fileutils
  - pathname
  - set
  - ostruct
  - logger
  - benchmark
  - digest
  - base64
  - securerandom
  - socket
  - tempfile
  - erb
  - cgi
  - date
  - time
  - singleton
  - forwardable
  - delegate
  - open-uri
  - optparse
  - stringio
  - io
  - pp
  - English
  - strscan
  - bigdecimal
  - openssl
  - readline

fan_in:
  strategy: none
  suffix: ".rb"

test_patterns:
  directories: ["test", "spec"]
  file_prefixes: ["test_"]
  file_suffixes: ["_test.rb", "_spec.rb"]

key_files:
  - Gemfile
  - Gemfile.lock
  - Rakefile
  - config/routes.rb
  - config/database.yml
  - config/application.rb
  - config/environments/production.rb

entry_points:
  - app.rb
  - config.ru
  - bin/rails
  - config/routes.rb
