name: PHP
extensions: [".php"]
ts_grammar: tree_sitter_php

ts_class_query: |
  (class_declaration
    name: (name) @name) @class
  (interface_declaration
    name: (name) @name) @class
  (trait_declaration
    name: (name) @name) @class
  (enum_declaration
    name: (name) @name) @class

ts_function_query: |
  (function_definition
    name: (name) @name
    parameters: (formal_parameters) @params) @function
  (method_declaration
    name: (name) @name
    parameters: (formal_parameters) @params) @function

ts_import_query: |
  (namespace_use_declaration
    (namespace_use_clause
      (qualified_name) @module))

stdlib_prefixes:
  - Illuminate
  - Symfony
  - Carbon
  - Doctrine
  - League
  - Monolog
  - Psr
  - GuzzleHttp
  - Ramsey
  - Faker
  - PHPUnit
  - Mockery

fan_in:
  strategy: backslash_to_slash
  suffix: ".php"
  package_markers: []

test_patterns:
  directories: ["tests", "test"]
  file_prefixes: []
  file_suffixes: ["Test.php"]

key_files:
  - composer.json
  - composer.lock
  - phpunit.xml
  - phpunit.xml.dist
  - routes/web.php
  - routes/api.php
  - config/app.php
  - config/database.php
  - app/Http/Kernel.php
  - webpack.mix.js
  - vite.config.js

entry_points:
  - index.php
  - artisan
  - bootstrap/app.php
  - server.php
