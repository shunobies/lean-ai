name: javascript-express
display_name: Express (JavaScript)
description: Express.js REST API with plain JavaScript
language: javascript
framework: express
aliases:
  - express
setup:
  type: files
  directories:
    - "src"
    - "tests"
  files:
    - path: "src/app.js"
      content: |
        const express = require("express");

        const app = express();

        app.use(express.json());

        app.get("/health", (_req, res) => {
          res.json({ status: "ok" });
        });

        module.exports = { app };
    - path: "src/server.js"
      content: |
        const { app } = require("./app");

        const PORT = process.env.PORT ?? 3000;

        app.listen(PORT, () => {
          console.log(`{project_name} listening on port ${PORT}`);
        });
    - path: "tests/health.test.js"
      content: |
        const request = require("supertest");
        const { app } = require("../src/app");

        describe("GET /health", () => {
          it("returns 200", async () => {
            const res = await request(app).get("/health");
            expect(res.status).toBe(200);
            expect(res.body.status).toBe("ok");
          });
        });
    - path: "package.json"
      content: |
        {
          "name": "{project_name}",
          "version": "0.1.0",
          "scripts": {
            "start": "node src/server.js",
            "test": "jest"
          },
          "dependencies": {
            "express": "^4.18.0"
          },
          "devDependencies": {
            "jest": "^29.0.0",
            "supertest": "^6.3.0"
          }
        }
    - path: ".gitignore"
      content: |
        node_modules/
